<meta name="description" content="问题 最近有个项目在IE11运行出了些问题，主要表现为无法登录。排查了一下原因，主要的登录接口调用成功了，但是紧接着的一个获取用户信息的接口返回了401，导致页面重新跳回了登录界面。  接口请求401的原因主要是没有携带Cookie，而为毛会没带Cookie呢？于是乎，就发现了接口请求后面一个括号：“来自缓存”。 百度了一下原因：  IE浏览器会缓存网页中的GET和XHR的内容，请求方式是GET时">
