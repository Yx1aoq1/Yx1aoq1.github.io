<meta name="description" content="享元模式 享元模式的定义：  运用共享技术，有效地支持大量地细粒度的对象，以避免对象之间拥有相同内容而造成多余的性能开销。享元模式是一种用时间换空间的优化模式。  举个例子 —— 内衣工厂 假设有个内衣工厂，目前的产品有50种男士内衣和50种女士内衣，为了推销产品，工厂决定生产一些塑料模特来穿上他们的内衣拍成广告照片。正常情况下需要50个男模特和50个女模特，然后让他们每人分别穿上一件内衣来拍照。">
