<meta name="description" content="Git 是什么  Git是一种分布式版本控制系统。  其中，“分布式”的概念是什么呢？“分布式”是相对于“集中式”来说的。把数据集中保存再服务器节点，所有的客户节点都从服务节点获取数据的版本控制系统叫做集中式版本控制系统，比如svn就是典型的集中式版本控制系统。与之相对的，Git的数据不止保存在服务器上，同时也完整的保存在本地计算机上，所以我们称Git为分布式的。 Git的优点：  本地是版本库的">
