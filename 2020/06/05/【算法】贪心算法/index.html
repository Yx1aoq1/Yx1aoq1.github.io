<meta name="description" content="贪心算法 贪心算法，是一种在每一步选择中都采取在当前状态下最好或最优的选择，从而希望导致结果是最好或最优的算法。它不从整体最优上加以考虑，所做出的仅是某种意义上的局部最优解。 贪心算法的基本思路：  建立数学模型来描述问题 把求解的问题分成若干个子问题 对每一个子问题求解，得到子问题的局部最优解 把子问题的局部最优解合成原来问题的解  贪心算法的基本要素：  具有最优子结构性质，即一个问题的最优解">
