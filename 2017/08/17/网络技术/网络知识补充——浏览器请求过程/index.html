<meta name="description" content="当我们在浏览器中输入一个url，页面是如何呈现出来的呢？  首先，我们在浏览器中输入一个url，浏览器的核心代码会将这个url进行拆分解析。 以Chrome浏览器为例，其解析过程：  搜索浏览器自身的DNS缓存，看这个域名的IP地址是否已经缓存 搜索操作系统自身的DNS缓存（浏览器没有找到缓存或缓存已经失效） 读取本地的HOST文件（操作系统的DNS缓存也没有找到） 浏览器发起一个DNS的一个系统">
